name: Bug
description: 예상과 다르게 동작하는 문제를 등록합니다.
title: "[Bug] "
labels:
  - bug
type: Bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: 어떤 문제가 발생했는지 간단히 적어 주세요.
      placeholder: 예) Spotify 플레이리스트 불러오기 실패 시 안내 문구가 표시되지 않습니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 문제를 다시 확인할 수 있는 순서를 적어 주세요.
      placeholder: |
        1. 팝업을 엽니다.
        2. Spotify 연결을 시도합니다.
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 원래 어떤 결과가 나와야 하는지 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 어떤 결과가 나오는지 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 참고 자료
      description: 스크린샷, 로그, 관련 링크가 있으면 첨부해 주세요.
    validations:
      required: false
