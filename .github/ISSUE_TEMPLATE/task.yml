name: Task
description: 구현, 정리, 설정 등 구체적인 작업을 등록합니다.
title: "[Task] "
labels:
  - task
type: Task
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 내용
      description: 해야 할 일을 간단히 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      description: 필요한 세부 작업이 있으면 적어 주세요.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false

  - type: textarea
    id: done
    attributes:
      label: 완료 기준
      description: 어떤 상태가 되면 완료로 볼 수 있는지 적어 주세요.
    validations:
      required: false
