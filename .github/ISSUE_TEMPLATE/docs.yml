name: Documentation
description: 문서 추가나 수정 요청을 등록합니다.
title: "[Docs] "
labels:
  - documentation
type: Task
body:
  - type: textarea
    id: summary
    attributes:
      label: 문서 작업 내용
      description: 어떤 문서를 추가하거나 수정해야 하는지 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 배경
      description: 문서가 필요한 이유나 참고할 내용을 적어 주세요.
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 링크, 파일, 화면이 있으면 첨부해 주세요.
    validations:
      required: false
